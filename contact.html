<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiblioTech — Contact</title>
  <link rel="stylesheet" href="style.css" />

  <!-- EXERCICE 1 — Colle ici le snippet GTM dans le <head> -->


  <!-- dataLayer push : page_view -->
  <script>
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: "page_view",
      page_type: "contact",
      page_title: "Contact",
    });
  </script>
</head>
<body>

  <!-- EXERCICE 1 — Colle ici le bloc <noscript> du conteneur GTM -->


  <header class="site-header">
    <a href="index.html" class="logo">BiblioTech</a>
    <nav class="nav">
      <a href="index.html">Accueil</a>
      <a href="produit.html">Produit</a>
      <a href="panier.html">Panier <span id="cart-badge" class="cart-badge" hidden>0</span></a>
      <a href="blog.html">Blog</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="exercices.html">Exercices</a>
    </nav>
  </header>

  <main>
    <section class="contact">
      <h1>Contacte-nous</h1>
      <p class="lede">Une question ? Écris-nous, on répond sous 24h.</p>

      <!--
        Formulaire « vrai » :
        - action="#" + method="post" → sémantique HTML correcte
        - PAS de novalidate → la validation HTML5 native s'exécute
        - GTM peut donc capter l'event submit avec « Check Validation »
      -->
      <form
        id="contact-form"
        name="contact-form"
        class="form"
        action="#"
        method="post"
      >
        <label>
          <span>Nom</span>
          <input type="text" name="nom" id="contact-nom" required minlength="2" />
        </label>

        <label>
          <span>Email</span>
          <input type="email" name="email" id="contact-email" required />
        </label>

        <label>
          <span>Sujet</span>
          <select name="sujet" id="contact-sujet" required>
            <option value="">— Choisis un sujet —</option>
            <option value="commande">Question sur ma commande</option>
            <option value="produit">Question sur un produit</option>
            <option value="autre">Autre</option>
          </select>
        </label>

        <label>
          <span>Message</span>
          <textarea name="message" id="contact-message" rows="5" required minlength="10"></textarea>
        </label>

        <button type="submit" class="btn btn-primary">Envoyer</button>

        <p id="form-success" class="form-success" hidden>
          ✓ Message envoyé, merci !
        </p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>© BiblioTech — Site pédagogique pour le cours Web Analytics</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
