<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiblioTech — Panier</title>
  <link rel="stylesheet" href="style.css" />

  <!-- EXERCICE 1 — Colle ici le snippet GTM dans le <head> -->


  <!-- dataLayer push : view_cart (lit le panier depuis localStorage) -->
  <script>
    window.dataLayer = window.dataLayer || [];
    (function () {
      var cart = { items: [] };
      try {
        cart = JSON.parse(localStorage.getItem("cart")) || { items: [] };
      } catch (e) {}

      var value = cart.items.reduce(function (sum, item) {
        return sum + item.price * item.quantity;
      }, 0);

      window.dataLayer.push({
        event: "view_cart",
        page_type: "cart",
        ecommerce: {
          currency: "EUR",
          value: Math.round(value * 100) / 100,
          items: cart.items
        }
      });
    })();
  </script>
</head>
<body>

  <!-- EXERCICE 1 — Colle ici le bloc <noscript> du conteneur GTM -->


  <header class="site-header">
    <a href="index.html" class="logo">BiblioTech</a>
    <nav class="nav">
      <a href="index.html">Accueil</a>
      <a href="produit.html">Produit</a>
      <a href="panier.html" class="active">Panier <span id="cart-badge" class="cart-badge" hidden>0</span></a>
      <a href="blog.html">Blog</a>
      <a href="contact.html">Contact</a>
      <a href="exercices.html">Exercices</a>
    </nav>
  </header>

  <main>
    <section class="cart">
      <div class="cart-header">
        <h1>Ton panier</h1>
        <button id="clear-cart-btn" class="btn-link" hidden>Vider le panier</button>
      </div>

      <!-- État vide -->
      <div id="cart-empty" class="cart-empty" hidden>
        <p>Ton panier est vide pour le moment.</p>
        <a href="produit.html" class="btn btn-primary">Découvrir le produit</a>
      </div>

      <!-- Liste des items (rendue par JS) -->
      <div id="cart-items"></div>

      <!-- Résumé -->
      <div id="cart-summary" class="cart-summary" hidden>
        <div class="line"><span>Sous-total</span><span id="subtotal">0,00 €</span></div>
        <div class="line"><span>Livraison</span><span>Gratuite</span></div>
        <div class="line total"><span>Total</span><span id="total">0,00 €</span></div>

        <button
          id="checkout-btn"
          class="btn btn-primary"
        >
          Valider la commande
        </button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© BiblioTech — Site pédagogique pour le cours Web Analytics</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
